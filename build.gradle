plugins {
	id 'java'
	id 'war' // 카페24 외부 톰캣에 배포하기 위해 war 플러그인 필수
	id 'org.springframework.boot' version '2.7.18' // Java 8 및 Tomcat 8.5 호환 버전
	id 'io.spring.dependency-management' version '1.0.15.RELEASE'
}

group = 'com.byd'
version = '0.0.1-SNAPSHOT'
sourceCompatibility = '1.8' // JDK 8

repositories {
	mavenCentral()
}

dependencies {
	// 1. Web & Tomcat
	implementation 'org.springframework.boot:spring-boot-starter-web'
	// 외부 톰캣(카페24)에서 구동할 때 내장 톰캣과 충돌하지 않도록 providedRuntime 설정
	providedRuntime 'org.springframework.boot:spring-boot-starter-tomcat'

	// JSP 처리용
	implementation 'org.apache.tomcat.embed:tomcat-embed-jasper'
	implementation 'javax.servlet:jstl' // Servlet 3.0 환경이므로 반드시 javax 사용

	// 2. Database (MariaDB 10.1.x)
	implementation 'org.mybatis.spring.boot:mybatis-spring-boot-starter:2.3.1'
	implementation 'org.mariadb.jdbc:mariadb-java-client:2.7.6' // MariaDB 권장 드라이버
	implementation group: 'org.bgee.log4jdbc-log4j2', name:'log4jdbc-log4j2-jdbc4.1', version: '1.16'

	// 3. Lombok
	compileOnly 'org.projectlombok:lombok'
	annotationProcessor 'org.projectlombok:lombok'
}

// 카페24 톰캣 배포 시 기본 루트("/") 경로로 인식되도록 파일명을 ROOT.war로 고정
bootWar {
	archiveFileName = 'ROOT.war'
}